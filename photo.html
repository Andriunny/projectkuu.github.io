<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foto Luri Wahyuni</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffe4e6, #fff0f5);
            font-family: 'Inter', sans-serif;
        }
        .polaroid {
            width: 300px;
            max-width: 90vw;
            background: white;
            padding: 1rem;
            border-radius: 20px;
            box-shadow: 0 12px 20px rgba(0,0,0,0.25);
            animation: float 6s ease-in-out infinite;
            position: relative;
        }
        .polaroid img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            filter: drop-shadow(0 0 15px rgba(255,105,180,0.7));
        }
        .polaroid::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 24px;
            background: rgba(255,20,147,0.3);
            z-index: -1;
        }
        @keyframes float {
            0%,100% { transform: translateY(-10px) rotate(-2deg); }
            50% { transform: translateY(10px) rotate(2deg); }
        }
        @media (max-width: 768px) {
            .polaroid { display: none; }
        }
        a.photo-link {
            display: inline-block;
            margin: 2rem auto;
            padding: 0.8rem 1.5rem;
            background: rgba(255,20,147,0.2);
            color: #ff1493;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        a.photo-link:hover { background: rgba(255,20,147,0.4); }
    </style>
</head>
<body>
    <a href="index.html" class="photo-link">← Kembali ke Utama</a>
    <div class="polaroid">
        <img src="foto4.jpeg" alt="Foto Luri Wahyuni" />
    </div>
</body>
</html>
